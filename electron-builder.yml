appId: com.omniagent.app
productName: OmniAgent
copyright: Copyright © 2024

directories:
  output: release
  buildResources: resources

files:
  - dist-electron/**/*
  - dist/**/*
  - "!node_modules/**/*"

extraResources:
  - from: agent-backend/requirements.txt
    to: agent-backend/requirements.txt
  - from: agent-backend/skills/
    to: agent-backend/skills/

win:
  icon: resources/icon.ico
  target:
    - target: portable
      arch: [x64]
  artifactName: "${productName}-${version}-portable.${ext}"

mac:
  icon: resources/icon.icns
  target:
    - target: dmg
      arch: [x64, arm64]
  artifactName: "${productName}-${version}.${ext}"

linux:
  icon: resources/icon.png
  target:
    - target: AppImage
      arch: [x64]
  artifactName: "${productName}-${version}.${ext}"
