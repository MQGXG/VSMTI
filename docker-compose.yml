version: '3.8'

services:
  backend:
    build:
      context: ./agent-backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - ./data:/app/data

  # 桌面版前端不需要 Docker，直接双击 .exe 即可
  # 如需 Web 版访问后端 API，可用此地址
  # http://localhost:8000/docs
